<mat-sidenav-container class="dashboard-wrapper">
  <mat-sidenav mode="side" opened class="sidebar">
    <div class="sidebar-header">
      <div class="title-section">
        <img src="SyntraPxlLogo.jpg" alt="syntra Logo" class="app-logo" />
      </div>
      <h2>Docentenradar</h2>
    </div>

    <mat-nav-list class="nav-links">
      <a mat-list-item routerLink="./statistics" routerLinkActive #rla1="routerLinkActive" [activated]="rla1.isActive">
        <mat-icon matListItemIcon>dashboard</mat-icon>
        <div matListItemTitle>overzicht</div>
      </a>

      <a mat-list-item routerLink="./users" routerLinkActive #rla2="routerLinkActive" [activated]="rla2.isActive">
        <mat-icon matListItemIcon>people</mat-icon>
        <div matListItemTitle>gebruikers</div>
      </a>

      <a mat-list-item routerLink="./teachers" routerLinkActive #rla3="routerLinkActive" [activated]="rla3.isActive">
        <mat-icon matListItemIcon>school</mat-icon>
        <div matListItemTitle>docenten</div>
      </a>
    </mat-nav-list>

    <div class="spacer"></div>

    <div class="sidebar-footer">
      <div class="user-info">
        <mat-icon>person</mat-icon>
        <div class="user-text">
          <span class="username">{{ currentUser()?.name }}</span>
          <span class="role-badge">{{ currentUser()?.role }}</span>
        </div>
      </div>

      <button mat-stroked-button color="warn" class="logout-btn" (click)="logout()">
        <mat-icon>logout</mat-icon>
        Logout
      </button>
    </div>
  </mat-sidenav>

  <mat-sidenav-content class="main-content">
    <div class="dashboard-container">
      <router-outlet></router-outlet>
    </div>
  </mat-sidenav-content>
</mat-sidenav-container>
