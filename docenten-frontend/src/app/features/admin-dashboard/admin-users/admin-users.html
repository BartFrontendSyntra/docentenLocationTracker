<div class="admin-container">

  <div class="page-header">
    <div class="title-section">
      <h2>User Management</h2>
      <p>Maak nieuwe gebruikers aan, bewerk of verwijder bestaande gebruikers.</p>
    </div>

    <button mat-flat-button color="primary" (click)="openUserForm()">
      <mat-icon>person_add</mat-icon>
      Nieuwe gebruiker
    </button>
  </div>

  <div class="table-container mat-elevation-z3">
    <table mat-table [dataSource]="users()">

      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef> Naam </th>
        <td mat-cell *matCellDef="let user">
          <strong>{{ user.name }}</strong>
        </td>
      </ng-container>

      <ng-container matColumnDef="email">
        <th mat-header-cell *matHeaderCellDef> Email </th>
        <td mat-cell *matCellDef="let user"> {{ user.email }} </td>
      </ng-container>

      <ng-container matColumnDef="role">
        <th mat-header-cell *matHeaderCellDef> Rol </th>
        <td mat-cell *matCellDef="let user">
          <mat-chip-set>
            <mat-chip [color]="user.role === 'admin' ? 'accent' : 'primary'" highlighted>
              {{ user.role | uppercase }}
            </mat-chip>
          </mat-chip-set>
        </td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef class="actions-header"> Acties </th>
        <td mat-cell *matCellDef="let user" class="actions-cell">
          <button mat-icon-button color="primary" (click)="openUserForm(user)" matTooltip="Edit User">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button color="warn" (click)="deleteUser(user)" matTooltip="Delete User">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;" class="user-row"></tr>

    </table>

    @if (!isLoading() && users().length === 0) {
      <div class="empty-state">
        <p>Geen gebruikers gevonden in het systeem.</p>
      </div>
    }
  </div>

</div>
